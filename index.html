<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伴读空间</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 40px 60px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        .btn {
            display: inline-block;
            font-size: 22px;
            color: #0070f3;
            text-decoration: none;
            font-weight: 600;
            padding: 12px 30px;
            border: 2px solid #0070f3;
            border-radius: 30px;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background-color: #0070f3;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <a href="./圣经伴读/index.html" class="btn">圣经伴读</a>
    </div>
</body>
</html>

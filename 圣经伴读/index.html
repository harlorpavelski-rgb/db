<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圣经伴读 - 目录</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
        }
        .btn {
            display: inline-block;
            font-size: 20px;
            color: #ff4d4f;
            text-decoration: none;
            font-weight: 600;
            padding: 12px 24px;
            border: 2px solid #ff4d4f;
            border-radius: 8px;
            background-color: #fff1f0;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background-color: #ff4d4f;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <a href="./viewer.html" class="btn">拜读某圣经中，实时更新吐槽</a>
    </div>
</body>
</html>

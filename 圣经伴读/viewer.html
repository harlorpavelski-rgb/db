<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正在阅读：拜读某圣经中，实时更新吐槽</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            background-color: #f0f2f5;
        }
        /* 顶部固定导航栏（移动端优化） */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 9999;
        }
        .title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 45%;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn {
            padding: 6px 12px;
            font-size: 13px;
            border: 1px solid #d9d9d9;
            background-color: #fff;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
        }
        .btn:hover:not(:disabled) {
            color: #40a9ff;
            border-color: #40a9ff;
        }
        .btn:disabled {
            background-color: #f5f5f5;
            color: rgba(0, 0, 0, 0.25);
            border-color: #d9d9d9;
            cursor: not-allowed;
        }
        .page-info {
            font-size: 13px;
            color: #666;
            min-width: 45px;
            text-align: center;
        }

        /* 核心：网页缩放容器 */
        .wrapper {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            height: calc(100% - 50px);
            overflow: auto; /* 允许手机端上下丝滑滚动 */
            -webkit-overflow-scrolling: touch;
        }

        /* 强制让电脑版网页基准宽度为 850px (适配大多数电脑备份网页) */
        .content-frame {
            width: 850px;
            height: 5000px; /* 预设一个足够高的长网页高度，脚本会自动根据内容动态拉伸 */
            border: none;
            transform-origin: top left; /* 从左上角开始缩放 */
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="title">📖 拜读某圣经吐槽</div>
        <div class="controls">
            <button id="prevBtn" class="btn" onclick="changePage(-1)">◀ 上一页</button>
            <span id="pageIndicator" class="page-info">1 / 5</span>
            <button id="nextBtn" class="btn" onclick="changePage(1)">下一页 ▶</button>
        </div>
    </div>

    <div class="wrapper" id="scrollWrapper">
        <iframe id="readerFrame" class="content-frame" src="./1.html"></iframe>
    </div>

    <script>
        let currentPage = 1;
        const totalPages = 5; // 如果你有6页，就把这里改成 6
        const basePath = "./";

        const frame = document.getElementById('readerFrame');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        const wrapper = document.getElementById('scrollWrapper');

        // 核心函数：根据手机屏幕宽度，自动计算缩放比例
        function doResize() {
            const windowWidth = window.innerWidth;
            const targetWidth = 850; // 电脑网页标准宽度

            // 如果屏幕宽度小于电脑网页宽度（说明是手机打开）
            if (windowWidth < targetWidth) {
                const scale = windowWidth / targetWidth;
                frame.style.transform = `scale(${scale})`;
                // 缩放后，由于高度也缩小了，需要反向把 iframe 的真实高度拉长，保证内容能看全
                frame.style.height = (wrapper.clientHeight / scale + 5000) + 'px';
            } else {
                // 如果是电脑打开，不需要缩放
                frame.style.transform = 'none';
                frame.style.width = '100%';
                frame.style.height = '100%';
            }
        }

        function updateUI() {
            frame.src = `${basePath}${currentPage}.html`;
            pageIndicator.innerText = `${currentPage} / ${totalPages}`;
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (currentPage === totalPages);
        }

        function changePage(direction) {
            currentPage += direction;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            updateUI();
        }

        // 当网页加载完成或者切换页面时，重置滚动条到最顶端，并重新计算缩放
        frame.onload = function() {
            wrapper.scrollTo(0, 0);
            // 尝试获取内部网页的真实高度，让滚动更丝滑
            try {
                const innerHeight = frame.contentWindow.document.body.scrollHeight;
                const scale = window.innerWidth / 850;
                if (window.innerWidth < 850) {
                    frame.style.height = (innerHeight + 200) + 'px';
                }
            } catch(e) {
                // 如果跨域或者获取失败，维持默认的大高度值
            }
        };

        // 监听屏幕大小改变（横屏、竖屏切换）
        window.addEventListener('resize', doResize);
        window.addEventListener('DOMContentLoaded', doResize);

        // 初始化
        updateUI();
        setTimeout(doResize, 300); // 延迟一点点确保计算精准
    </script>
</body>
</html>

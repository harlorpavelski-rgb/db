<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在阅读：拜读某圣经中，实时更新吐槽</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            background-color: #f0f2f5;
        }
        /* 顶部固定导航栏 */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 9999;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn {
            padding: 8px 16px;
            font-size: 14px;
            border: 1px solid #d9d9d9;
            background-color: #fff;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
        }
        .btn:hover:not(:disabled) {
            color: #40a9ff;
            border-color: #40a9ff;
        }
        .btn:disabled {
            background-color: #f5f5f5;
            color: #rgba(0, 0, 0, 0.25);
            border-color: #d9d9d9;
            cursor: not-allowed;
        }
        .page-info {
            font-size: 14px;
            color: #666;
            min-width: 60px;
            text-align: center;
        }
        /* 内容展示区域（占满屏幕剩余部分） */
        .content-frame {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100% - 60px);
            border: none;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="title">📖 拜读某圣经中，实时更新吐槽</div>
        <div class="controls">
            <button id="prevBtn" class="btn" onclick="changePage(-1)">◀ 上一页</button>
            <span id="pageIndicator" class="page-info">1 / 5</span>
            <button id="nextBtn" class="btn" onclick="changePage(1)">下一页 ▶</button>
        </div>
    </div>

    <iframe id="readerFrame" class="content-frame" src="./拜读某圣经中，实时更新吐槽/1.html"></iframe>

    <script>
        let currentPage = 1;
        const totalPages = 5;
        const basePath = "./拜读某圣经中，实时更新吐槽/";
        
        const frame = document.getElementById('readerFrame');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        function updateUI() {
            // 改变 iframe 的地址，实现翻页
            frame.src = `${basePath}${currentPage}.html`;
            // 更新页码显示
            pageIndicator.innerText = `${currentPage} / ${totalPages}`;
            // 按钮禁用逻辑
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (currentPage === totalPages);
        }

        function changePage(direction) {
            currentPage += direction;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            updateUI();
            // 翻页后网页自动滚动回最顶端
            frame.onload = function() {
                frame.contentWindow.scrollTo(0, 0);
            }
        }

        // 初始化按钮状态
        updateUI();
    </script>
</body>
</html>

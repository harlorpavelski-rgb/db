<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>正在阅读：拜读某圣经中，实时更新吐槽</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            /* 手机端允许外层滚动，避免内容被 iframe 截断 */
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        /* 顶部固定导航栏 */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 9999;
        }
        .title {
            font-size: 15px;
            font-weight: bold;
            color: #333;
            /* 手机上标题过长时自动省略号，防止挤压按钮 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 45%;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn {
            padding: 6px 12px;
            font-size: 13px;
            border: 1px solid #d9d9d9;
            background-color: #fff;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
        }
        .btn:hover:not(:disabled) {
            color: #40a9ff;
            border-color: #40a9ff;
        }
        .btn:disabled {
            background-color: #f5f5f5;
            color: rgba(0, 0, 0, 0.25);
            border-color: #d9d9d9;
            cursor: not-allowed;
        }
        .page-info {
            font-size: 13px;
            color: #666;
            min-width: 50px;
            text-align: center;
        }
        /* 内容展示区域：自适应手机屏幕高度和宽度 */
        .content-frame {
            position: absolute;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100% - 60px);
            border: none;
            display: block;
        }

        /* 针对手机端的额外样式微调 */
        @media (max-width: 600px) {
            .nav-bar { padding: 0 10px; }
            .btn { padding: 6px 10px; font-size: 12px; }
            .page-info { font-size: 12px; min-width: 45px; }
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="title">📖 拜读某圣经中，实时更新吐槽</div>
        <div class="controls">
            <button id="prevBtn" class="btn" onclick="changePage(-1)">◀ 上一页</button>
            <span id="pageIndicator" class="page-info">1 / 5</span>
            <button id="nextBtn" class="btn" onclick="changePage(1)">下一页 ▶</button>
        </div>
    </div>

    <iframe id="readerFrame" class="content-frame" src="./拜读某圣经中，实时更新吐槽/1.html"></iframe>

    <script>
        let currentPage = 1;
        const totalPages = 5;
        const basePath = "./拜读某圣经中，实时更新吐槽/";

        const frame = document.getElementById('readerFrame');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        function updateUI() {
            frame.src = `${basePath}${currentPage}.html`;
            pageIndicator.innerText = `${currentPage} / ${totalPages}`;
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (currentPage === totalPages);
        }

        function changePage(direction) {
            currentPage += direction;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            updateUI();

            frame.onload = function() {
                // 确保跨页时，内外层都能平滑回到最顶端
                window.scrollTo(0, 0);
                try {
                    if(frame.contentWindow) {
                        frame.contentWindow.scrollTo(0, 0);
                    }
                } catch(e) {
                    console.log("Cross-origin restriction or frame missing");
                }
            }
        }

        // 初始化按钮状态
        updateUI();
    </script>
</body>
</html>

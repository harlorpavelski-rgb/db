<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在阅读：拜读某圣经中，实时更新吐槽</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f7f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        /* 顶部固定导航栏 */
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 55px;
            background-color: #ffffff;
            box-shadow: 0 1px 5px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 9999;
        }
        .title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn {
            padding: 6px 14px;
            font-size: 13px;
            border: 1px solid #d9d9d9;
            background-color: #fff;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:disabled {
            background-color: #f5f5f5;
            color: #bfbfbf;
            cursor: not-allowed;
        }
        .page-info {
            font-size: 13px;
            color: #666;
            min-width: 45px;
            text-align: center;
        }

        /* 手机端丝滑内容容器 */
        .content-container {
            margin-top: 55px;
            padding: 15px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            background: #ffffff;
            min-height: calc(100vh - 55px);
        }

        /* 核心：强制重写原本网页里乱七八糟的手机端样式 */
        #hiddenIframe {
            display: none; /* 隐藏原本的丑陋盒子 */
        }

        /* 让抓取出来的图片在手机上100%撑满，文字自动换行 */
        .extracted-content img {
            max-width: 100% !important;
            height: auto !important;
            display: block;
            margin: 15px auto;
            border-radius: 4px;
        }
        .extracted-content p, .extracted-content div {
            max-width: 100% !important;
            width: auto !important;
            font-size: 16px !important;
            line-height: 1.6 !important;
            color: #222 !important;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <div class="title">📖 拜读某圣经吐槽</div>
        <div class="controls">
            <button id="prevBtn" class="btn" onclick="changePage(-1)">◀ 上一页</button>
            <span id="pageIndicator" class="page-info">1 / 5</span>
            <button id="nextBtn" class="btn" onclick="changePage(1)">下一页 ▶</button>
        </div>
    </div>

    <div class="content-container">
        <div id="displayArea" class="extracted-content">正在加载内容...</div>
    </div>

    <iframe id="hiddenIframe" src=""></iframe>

    <script>
        let currentPage = 1;
        const totalPages = 5; // 如果你有6页就改成6
        const basePath = "./";

        const iframe = document.getElementById('hiddenIframe');
        const displayArea = document.getElementById('displayArea');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        function loadPageContent() {
            displayArea.innerHTML = "正在拉取内容，请稍候...";
            // 改变隐藏 iframe 的地址去读取原始 html
            iframe.src = `${basePath}${currentPage}.html`;
        }

        // 当原始网页在后台加载完后，我们把里面的“精华”肉眼可见地偷出来
        iframe.onload = function() {
            try {
                // 找到原本豆瓣网页的主体内容（通常在 body 里）
                const iframeDocument = iframe.contentDocument || iframe.contentWindow.document;

                // 尝试抓取正文区域，如果没有特定容器，就直接拿整个 body 里面的内容
                let contentHtml = iframeDocument.body.innerHTML;

                // 将精华内容塞进我们的手机自适应容器里
                displayArea.innerHTML = contentHtml;

                // 页面滚动回顶部
                window.scrollTo(0, 0);
            } catch (e) {
                displayArea.innerHTML = "<p style='color:red; padding:20px;'>本地预览受浏览器安全限制无法直接抓取。请直接推送至 GitHub 查看手机完美效果！</p>";
            }
        };

        function changePage(direction) {
            currentPage += direction;
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            // 更新按钮和数字
            pageIndicator.innerText = `${currentPage} / ${totalPages}`;
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (currentPage === totalPages);

            loadPageContent();
        }

        // 初始化
        prevBtn.disabled = true;
        loadPageContent();
    </script>
</body>
</html>
